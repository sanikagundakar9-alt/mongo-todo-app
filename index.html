<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Todo App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f4; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button.delete-btn { background-color: #dc3545; padding: 5px 10px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📝 My Todo List (Backend Powered)</h2>
        
        <!-- Task Add karnyacha Form -->
        <form action="/add-todo" method="POST" class="input-box">
            <input type="text" name="todoItem" placeholder="Navin kaam/task taka..." required>
            <button type="submit">Add Task</button>
        </form>

        <!-- Tasks chi list display karne -->
        <div id="todo-list">
            <!-- Backend kadhun yenara data ithe inject hoil -->
        </div>
    </div>

</body>
</html>
